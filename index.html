<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảo Tàng Nghệ Thuật 3D - Professional</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #050505; }
        
        /* Giao diện hướng dẫn */
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; z-index: 100; cursor: pointer;
        }

        /* HUD - Thông tin góc màn hình */
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #00ff00;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            pointer-events: none; font-family: 'Courier New', monospace;
            border: 1px solid #00ff00; font-size: 13px; min-width: 200px;
        }

        /* Tâm ngắm Dấu Cộng (+) */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 16px; height: 16px;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 50;
        }
        #crosshair::before {
            content: ""; position: absolute; top: 50%; left: 0;
            width: 100%; height: 2px; background: rgba(255,255,255,0.8);
            transform: translateY(-50%);
        }
        #crosshair::after {
            content: ""; position: absolute; left: 50%; top: 0;
            width: 2px; height: 100%; background: rgba(255,255,255,0.8);
            transform: translateX(-50%);
        }
        #crosshair.active::before, #crosshair.active::after { background: #ffff00; }

        /* Bảng mô tả tác phẩm */
        #art-description {
            display: none; position: absolute; top: 50%; right: 5%; 
            transform: translateY(-50%); background: rgba(15, 15, 15, 0.95); 
            color: white; padding: 30px; border-left: 5px solid #00ff00;
            width: 320px; 
            /* Cho phép click vào nút bấm bên trong bảng */
            pointer-events: auto; 
            z-index: 80;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #art-title { margin: 0 0 10px 0; color: #00ff00; text-transform: uppercase; }
        #art-text { line-height: 1.6; color: #ccc; margin-bottom: 20px; }

        /* Style cho nút bấm Media */
        #media-btn {
            background: #00ff00;
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: none; /* Ẩn mặc định, chỉ hiện khi có media */
        }
        #media-btn:hover {
            background: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }
        video {
            width: 100%;
            margin-top: 15px;
            border: 1px solid #333;
            display: none;
        }

        .key { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="instructions">
        <h1 style="letter-spacing: 5px;">BẢO TÀNG 3D</h1>
        <p style="font-size: 1.2em; color: #00ff00;">CLICK ĐỂ BẮT ĐẦU</p>
        <p>(Di chuyển: <span class="key">WASD</span> | Chạy: <span class="key">SHIFT</span> | Nhảy: <span class="key">SPACE</span>)</p>
        <p>(Tương tác: <span class="key">E</span> | Thoát: <span class="key">ESC</span>)</p>
    </div>

    <div id="crosshair"></div>

    <div id="hud">
        <div id="status">Trạng thái: Đang đứng yên</div>
        <div id="pos">X: 0 | Z: 0</div>
    </div>

    <div id="art-description">
        <h2 id="art-title">Tiêu đề</h2>
        <p id="art-text">Mô tả chi tiết...</p>
        
        <button id="media-btn">▶ PHÁT THUYẾT MINH</button>
        
        <video id="art-video" controls></video>
        <audio id="art-audio"></audio>

        <p style="font-size: 0.8em; color: #666; margin-top: 15px;">Nhấn <span class="key">E</span> để đóng</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
